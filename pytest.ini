[pytest]
# PyTest configuration for SentimentIQ
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

markers =
    auth: Tests for authentication functionality
    sentiment: Tests for sentiment analysis
    api: Tests for API endpoints
    integration: Integration tests
